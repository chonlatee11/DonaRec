# docker-compose.yml — Local development stack for donnarec-api
#
# Services:
#   postgres  — PostgreSQL 17 (shared for both app and Keycloak databases)
#   keycloak  — Self-hosted Keycloak 26.6.3 (OIDC identity provider)
#   minio     — MinIO object storage for donation slip files (Plan 03-04, D-48)
#   chrome    — Headless Chromium sidecar for PDF rendering (Phase 4, D-58).
#               Internal-only — no host `ports:` mapping; reached by `api`
#               (and by tests via testutil.StartChrome) over the internal
#               compose network at ws://chrome:9222 only.
#   migrate   — golang-migrate init-service (runs DB migrations before api starts)
#   api       — donnarec-api Go backend
#
# Usage:
#   1. Copy .env.example to .env and fill in DB_PASSWORD, KC_ADMIN_PASSWORD,
#      DONAREC_KEK (openssl rand -hex 32), and OIDC_ISSUER
#   2. docker compose up -d --wait
#      Migrations run automatically via the migrate service before api starts.
#      No manual 'make migrate-up' required.
#   3. Import Keycloak realm: keycloak/realm-donnarec.json (auto-imported on first start)
#   4. Run: bash ../scripts/seed-admin.sh  (creates first admin user)
#
# After startup:
#   API:         http://localhost:8000/healthz
#   Keycloak:    http://localhost:8080 (admin console)
#   MinIO UI:    http://localhost:9001  (admin console — MINIO_ACCESS_KEY / MINIO_SECRET_KEY)

x-common-env: &postgres-common
  POSTGRES_USER: ${DB_USER:-donnarec}
  POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — copy .env.example to .env}

services:
  # ----------------------------------------------------------------
  # PostgreSQL 17 — primary data store for both app and Keycloak
  # ----------------------------------------------------------------
  postgres:
    image: postgres:17
    environment:
      <<: *postgres-common
      POSTGRES_DB: donnarec_app
      # Create additional database for Keycloak on first startup
      POSTGRES_MULTIPLE_DATABASES: donnarec_app,donnarec_keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-donnarec} -d donnarec_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Keycloak 26.6.3 — OIDC identity provider (self-hosted)
  #
  # IMPORTANT: uses `start` (production mode), NOT `start-dev` (Pitfall 4).
  # start-dev uses an in-memory H2 database; data is lost on restart.
  # Production mode uses our PostgreSQL database for persistence.
  # ----------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command: start --import-realm
    environment:
      # Database backend for Keycloak (persistence — not start-dev ephemeral)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/donnarec_keycloak
      KC_DB_USERNAME: ${DB_USER:-donnarec}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

      # Hostname config (Keycloak 26):
      # KC_HOSTNAME_URL sets the issuer URL returned in OIDC discovery.
      # Using the internal Docker hostname so the Go API can reach Keycloak
      # and the issuer URL in the discovery document matches what go-oidc
      # sends for JWKS discovery.  KC_HOSTNAME_STRICT=false allows browser
      # access via localhost:8080 for admin console without issuer mismatch.
      KC_HOSTNAME_URL: "http://keycloak:8080"
      KC_HOSTNAME_ADMIN_URL: "http://localhost:8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # Keycloak admin credentials (for initial setup only)
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required}

      # Logging level
      KC_LOG_LEVEL: INFO

      # Enable health endpoint on management port 9000 (required for /health/ready probe)
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ----------------------------------------------------------------
  # MinIO — S3-compatible object storage for donation slip files
  #
  # Used by donnarec-api for slip attachment storage (Plan 03-04, D-48).
  # Phase 6 (public Flow B slip uploads) reuses this same MinIO instance.
  #
  # Dev credentials are set via MINIO_ACCESS_KEY / MINIO_SECRET_KEY in .env
  # (defaults to minioadmin / minioadmin — change in any non-local environment).
  #
  # Ports:
  #   9000 — S3 API endpoint (used by donnarec-api MINIO_ENDPOINT=minio:9000)
  #   9001 — MinIO web console (http://localhost:9001 for manual bucket management)
  # ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------------
  # chrome — Headless Chromium sidecar for server-side PDF rendering
  # (Phase 4, D-58; 04-RESEARCH.md Pattern 4, verified live).
  #
  # Deliberately a SEPARATE service/image from `api`: the app's own runtime
  # image is a minimal debian-slim static Go binary; bundling a full Chromium
  # into it would bloat every deploy and couple two very different
  # crash/restart domains (browser crash vs. API crash).
  #
  # SECURITY (T-04-03, D-58, WR-01 fix 04-REVIEW.md): this service has NO
  # `ports:` mapping (blocks HOST -> container / inbound only) AND is
  # attached ONLY to the `chrome-internal` network, which is declared
  # `internal: true` below — Docker refuses to route ANY traffic from an
  # `internal: true` network to the outside world, so this container has
  # zero outbound route regardless of what runs inside it. It is reachable
  # ONLY by `api` (also joined to chrome-internal, via
  # chromedp.NewRemoteAllocator, added in 04-03) and by integration tests
  # (via testutil.StartChrome, 04-02 Task 2 — a separate testcontainers
  # network, not this compose project). Network isolation is layer 1 of 3
  # defense-in-depth against the admin-authored-HTML render surface; layers
  # 2/3 (CDP Fetch-block + Emulation.SetScriptExecutionDisabled) live in Go
  # render code, not here.
  # ----------------------------------------------------------------
  chrome:
    build:
      context: .
      dockerfile: docker/chrome.Dockerfile
    networks:
      - chrome-internal
    restart: unless-stopped

  # ----------------------------------------------------------------
  # migrate — golang-migrate init-service (GAP 1)
  #
  # Runs all pending DB migrations before the api service starts.
  # Uses the official migrate/migrate image (pinned tag matches Makefile v4.19.1).
  # This is an init-container pattern: it runs once, exits 0 on success, and
  # api depends_on it with condition: service_completed_successfully.
  # golang-migrate is idempotent via schema_migrations — up on an already-migrated
  # DB is a no-op (exit 0), so repeated `docker compose up` on the same volume is safe.
  # ----------------------------------------------------------------
  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-donnarec}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/donnarec_app?sslmode=disable",
        "up"
      ]
    # No restart policy — this is an init-service that must exit after completing.
    # restart: unless-stopped would cause a restart loop after exit 0.

  # ----------------------------------------------------------------
  # donnarec-api — Go backend
  # ----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8000"
      DATABASE_URL: postgres://${DB_USER:-donnarec}:${DB_PASSWORD:?}@postgres:5432/donnarec_app?sslmode=disable
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-donnarec}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-donnarec-backend}
      # OIDC_ISSUER: expected "iss" claim in tokens (GAP 2).
      # Tokens fetched via browser/localhost carry iss=http://localhost:8080/realms/donnarec.
      # KEYCLOAK_BASE_URL stays as the internal discovery URL (keycloak:8080).
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080/realms/donnarec}
      DONAREC_KEK: "${DONAREC_KEK:?DONAREC_KEK is required — generate with: openssl rand -hex 32}"
      RETENTION_DONATION_DAYS: ${RETENTION_DONATION_DAYS:-1825}
      RETENTION_AUDIT_DAYS: ${RETENTION_AUDIT_DAYS:-3650}
      RETENTION_DEFAULT_LEGAL_BASIS: ${RETENTION_DEFAULT_LEGAL_BASIS:-tax_obligation}
      # MinIO object storage (Plan 03-04, D-48) — api reaches MinIO via internal Docker network
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-donnarec-slips}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_RECEIPTS_BUCKET: ${MINIO_RECEIPTS_BUCKET:-donnarec-receipts}
      # Chrome sidecar (Phase 4, D-58) — reached over the internal network only.
      CHROME_WS_URL: ${CHROME_WS_URL:-ws://chrome:9222}
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      # default: reach postgres/keycloak/minio (unrestricted egress).
      # chrome-internal: ALSO join the internal-only network so api can still
      # reach ws://chrome:9222 (WR-01) — api itself is not egress-restricted;
      # only chrome is (it has no other reason to ever need internet access).
      - default
      - chrome-internal
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      chrome:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  # chrome-internal (WR-01 fix, 04-REVIEW.md): internal:true tells Docker to
  # NEVER add a default route / NAT rule for this network — containers
  # attached to it (chrome) have no path to the internet at all, closing the
  # gap between what the D-58 comments claimed ("network-isolated sidecar")
  # and what the compose file actually configured (previously just "no
  # inbound ports:", which never blocked outbound/egress).
  chrome-internal:
    internal: true

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
